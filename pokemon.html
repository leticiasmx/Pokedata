<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéData Pro</title>

<style>
:root{
    --bg:#0f0f14;
    --card:#171720;
    --card2:#1e1e2a;
    --text:#f5f5f7;
    --muted:#a1a1aa;
    --accent:#d48aa3;
    --accent2:#9c5b74;
    --bar:#2a2a3a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui;
}

body{
    background: radial-gradient(circle at top, #1a1a25, var(--bg));
    color:var(--text);
    padding:30px 14px;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:18px;
}

header h1{
    font-size:30px;
    color:var(--accent);
}

header p{
    color:var(--muted);
    font-size:13px;
}

/* SEARCH */
.search{
    display:flex;
    gap:10px;
    background:var(--card);
    padding:12px;
    border-radius:16px;
    border:1px solid #2a2a35;
}

.search input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#11111a;
    color:var(--text);
}

button{
    padding:12px 14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.btn{
    background:var(--accent);
    color:#fff;
}

.btn:hover{
    background:var(--accent2);
}

.btn2{
    background:#2a2a3a;
    color:var(--text);
}

/* CARD */
.card{
    margin-top:20px;
    background:var(--card);
    border-radius:22px;
    overflow:hidden;
    border:1px solid #2a2a35;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.img{
    background:linear-gradient(180deg,#1c1c28,#14141d);
    text-align:center;
    padding:30px;
}

.img img{
    width:180px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

.content{
    padding:20px;
}

.name{
    font-size:26px;
    font-weight:700;
    color:var(--accent);
    text-transform:capitalize;
}

.id{
    font-size:12px;
    color:var(--muted);
    margin-bottom:10px;
}

/* TYPES */
.tags{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.tag{
    background:#2a2230;
    padding:5px 10px;
    border-radius:999px;
    font-size:11px;
    color:#f0c7d6;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:12px;
}

.box{
    background:var(--card2);
    padding:10px;
    border-radius:12px;
    font-size:13px;
    color:var(--muted);
}

/* STATS */
.stats{
    margin-top:14px;
    background:var(--card2);
    padding:14px;
    border-radius:14px;
}

.stat{
    margin-bottom:10px;
}

.stat-title{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:4px;
}

.bar{
    width:100%;
    height:8px;
    background:var(--bar);
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
}

/* DESC */
.desc{
    margin-top:12px;
    padding:12px;
    background:#1a1a24;
    border-radius:14px;
    border-left:3px solid var(--accent);
    font-size:13px;
    line-height:1.5;
    color:#d6d6d6;
}

.loading{
    text-align:center;
    margin-top:30px;
}

.spinner{
    width:35px;
    height:35px;
    border:3px solid #333;
    border-top:3px solid var(--accent);
    border-radius:50%;
    margin:auto;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

@media(max-width:600px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>PokéData Pro</h1>
    <p>Pokédex profissional com dados completos</p>
</header>

<div class="search">
    <input id="input" placeholder="Digite nome ou número (ex: pikachu)">
    <button class="btn" onclick="buscar()">Buscar</button>
    <button class="btn2" onclick="aleatorio()">🎲</button>
</div>

<div id="resultado"></div>

</div>

<script>

/* TRADUÇÕES */
const traducaoStats = {
    hp: "Vida (HP)",
    attack: "Ataque",
    defense: "Defesa",
    "special-attack": "Ataque Especial",
    "special-defense": "Defesa Especial",
    speed: "Velocidade"
};

const traducaoTipos = {
    fire:"Fogo",
    water:"Água",
    grass:"Planta",
    electric:"Elétrico",
    bug:"Inseto",
    normal:"Normal",
    poison:"Veneno",
    ground:"Terrestre",
    flying:"Voador",
    psychic:"Psíquico",
    rock:"Pedra",
    ghost:"Fantasma",
    ice:"Gelo",
    dragon:"Dragão",
    dark:"Sombrio",
    steel:"Aço",
    fairy:"Fada",
    fighting:"Lutador"
};

/* TRADUÇÃO SIMPLES DE TEXTO */
function traduzirTexto(texto){
    const dic = {
        fire:"fogo",
        water:"água",
        grass:"planta",
        electric:"elétrico",
        bug:"inseto",
        normal:"normal",
        poison:"veneno",
        ground:"terrestre",
        flying:"voador",
        psychic:"psíquico",
        rock:"pedra",
        ghost:"fantasma",
        ice:"gelo",
        dragon:"dragão",
        dark:"sombrio",
        steel:"aço",
        fairy:"fada",
        fighting:"lutador"
    };

    let t = texto.toLowerCase();

    for (const k in dic){
        t = t.replaceAll(k, dic[k]);
    }

    return t;
}

/* BUSCAR POKÉMON */
async function getPokemon(id){
    const p = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json());
    const s = await fetch(p.species.url).then(r=>r.json());

    const descRaw =
        s.flavor_text_entries.find(e => e.language.name === "pt-BR")?.flavor_text ||
        s.flavor_text_entries.find(e => e.language.name === "pt")?.flavor_text ||
        s.flavor_text_entries.find(e => e.language.name === "en")?.flavor_text ||
        "Descrição não disponível.";

    const descFinal = traduzirTexto(
        descRaw
        .replace(/\n|\f/g," ")
        .replace(/\s+/g," ")
        .trim()
    );

    return {
        nome:p.name,
        id:p.id,
        img:p.sprites.other["official-artwork"].front_default,
        altura:p.height/10,
        peso:p.weight/10,
        experiencia:p.base_experience,
        tipos:p.types.map(t=>t.type.name),
        stats:p.stats,
        desc: descFinal
    };
}

/* RENDER */
function render(p){

    return `
    <div class="card">

        <div class="img">
            <img src="${p.img}">
        </div>

        <div class="content">

            <div class="name">${p.nome}</div>
            <div class="id">Número Nacional: #${p.id}</div>

            <div class="tags">
                ${p.tipos.map(t=>`
                    <span class="tag">${traducaoTipos[t] || t}</span>
                `).join("")}
            </div>

            <div class="grid">
                <div class="box">Altura: ${p.altura} m</div>
                <div class="box">Peso: ${p.peso} kg</div>
                <div class="box">Experiência base: ${p.experiencia}</div>
            </div>

            <div class="stats">
                ${p.stats.map(s=>`
                    <div class="stat">
                        <div class="stat-title">
                            <span>${traducaoStats[s.stat.name] || s.stat.name}</span>
                            <span>${s.base_stat}</span>
                        </div>
                        <div class="bar">
                            <div class="fill" style="width:${Math.min(s.base_stat/2,100)}%"></div>
                        </div>
                    </div>
                `).join("")}
            </div>

            <div class="desc">
                <b>Descrição da espécie:</b><br><br>
                ${p.desc}
            </div>

        </div>
    </div>
    `;
}

/* BUSCAR */
async function buscar(){
    const id = document.getElementById("input").value;
    if(!id) return;

    document.getElementById("resultado").innerHTML =
    `<div class="loading"><div class="spinner"></div></div>`;

    const p = await getPokemon(id);
    document.getElementById("resultado").innerHTML = render(p);
}

/* ALEATÓRIO */
function aleatorio(){
    const id = Math.floor(Math.random()*1010)+1;
    document.getElementById("input").value = id;
    buscar();
}

buscar("pikachu");

</script>

</body>
</html>
